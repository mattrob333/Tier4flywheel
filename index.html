    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What does Tier 4 Intelligence actually do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tier 4 Intelligence designs, deploys, and manages a five-stage AI growth flywheel for home services companies and PE-backed operators. The system combines programmatic SEO, AI voice agents, lead qualification, dispatch optimization, and reputation automation."
          }
        },
        {
          "@type": "Question",
          "name": "Who is the ideal client?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The best fit is a home services company or PE-backed platform with meaningful inbound lead flow, field operations, and a need to improve booking rates, technician efficiency, and local search visibility without adding headcount."
          }
        },
        {
          "@type": "Question",
          "name": "How long does the rollout take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tier 4 Intelligence uses a 90-day prove-it deployment that starts with data and workflow mapping, then launches customer acquisition and contact automation, then layers in dispatch and review systems."
          }
        },
        {
          "@type": "Question",
          "name": "Does the flywheel integrate with existing field service software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The system is designed to work with existing operational tools such as ServiceTitan, Housecall Pro, Jobber, FieldEdge, RingCentral, and adjacent CRM or FSM infrastructure."
          }
        },
        {
          "@type": "Question",
          "name": "What is an AI Readiness Score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI Readiness Score measures how visible and citable a business's website is to AI search engines like ChatGPT, Perplexity, and Google AI Overviews. It scores technical health, content quality, schema markup, llms.txt configuration, and brand authority signals. Most home services businesses score between 25 and 45 out of 100. Tier 4 Intelligence offers a free AI Readiness Audit at tier4intelligence.com/api/report."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI Growth Flywheel work for HVAC companies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Tier 4 Intelligence AI Growth Flywheel deploys five connected systems for HVAC businesses: hyper-local SEO pages that rank in Google and AI search engines, targeted Meta and Google ads, AI voice agents that answer every call 24/7, automated lead scoring and dispatch, and a reputation engine that collects 5-star Google reviews automatically. Each stage feeds the next, compounding results over time."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to implement the AI Growth Flywheel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Full deployment takes 90 days. Days 1-15: AI Readiness Audit and system integration mapping. Days 15-45: SEO pages deployed, ads running, AI voice agents live. Days 45-75: Lead scoring and smart dispatch active. Days 75-90: Reputation engine running and all five stages connected. After day 90, Tier 4 Intelligence manages the system permanently."
          }
        },
        {
          "@type": "Question",
          "name": "Does the AI Growth Flywheel work with ServiceTitan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Tier 4 Intelligence AI Growth Flywheel integrates natively with ServiceTitan, Housecall Pro, Jobber, FieldEdge, and other major field service platforms. No rip-and-replace required. The system layers on top of your existing tools."
          }
        }
      ]
